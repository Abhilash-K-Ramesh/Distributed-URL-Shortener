services:
  app:
    build: ./app
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=urlshortener
      - DB_USER=postgres
      - DB_PASSWORD=devpass
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=devpass
      - POSTGRES_DB=urlshortener
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata: